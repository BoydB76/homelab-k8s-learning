---
- name: Prepare all k3s nodes
  hosts: k3s_cluster
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - apt-transport-https
          - ca-certificates
        state: present

- name: Install k3s master
  hosts: k3s_master
  become: yes

  tasks:
    - name: Install k3s on master
      shell: |
        curl -sfL https://get.k3s.io | sh -s - server \
          --cluster-init \
          --disable traefik \
          --write-kubeconfig-mode 644
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        state: present
        timeout: 120

    - name: Get node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Save token as fact
      set_fact:
        k3s_token: "{{ node_token.content | b64decode | trim }}"

    - name: Get kubeconfig
      slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig

    - name: Save kubeconfig locally
      copy:
        content: "{{ kubeconfig.content | b64decode | replace('127.0.0.1', '192.168.1.150') }}"
        dest: ~/ansibleplaybooks/ansible-k3s/k3s-kubeconfig.yml
      delegate_to: localhost
      become: no

- name: Install k3s workers
  hosts: k3s_workers
  become: yes

  tasks:
    - name: Install k3s on workers
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://192.168.1.150:6443 \
          K3S_TOKEN="{{ hostvars['k3s-master']['k3s_token'] }}" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s agent to start
      systemd:
        name: k3s-agent
        state: started
        enabled: yes
