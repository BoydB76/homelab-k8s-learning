apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: nginx
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
  - port: 80        # Service port
    targetPort: 80  # Container port
    nodePort: 30080 # External port (30000-32767 range)
    protocol: TCP
    name: http
